    (function () {
      try {
        if (localStorage.getItem('animationsDefaultReducedV2') !== '1') {
          localStorage.setItem('animationsEnabled', 'false');
          localStorage.setItem('animationsDefaultReducedV2', '1');
        }
        if (localStorage.getItem('animationsEnabled') !== 'true') {
          document.documentElement.classList.add('animations-disabled');
        }
      } catch (error) {
        document.documentElement.classList.add('animations-disabled');
      }
    })();
  </script>

  <style>
    :root {
      --primary-color: #c0392b;
      --secondary-color: #f39c12;
      --app-font-size: 16px;
      --app-transition-speed: 0.3s;
    }

    html {
      font-size: var(--app-font-size);
    }

    .animations-disabled *,
    .animations-disabled *::before,
    .animations-disabled *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }

    body {
      font-family: var(--font-ui);
      background-color: #fffdf7;
      /* Warm Ivory */
      transition: background-color var(--app-transition-speed), color var(--app-transition-speed);
    }

    .dark body {
      background-color: #0f172a;
      color: #f8fafc;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #d6d3d1;
      /* Stone 300 */
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a8a29e;
      /* Stone 400 */
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #475569;
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .flip-card {
      perspective: 1000px;
    }

    .flip-card-inner {
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .flip-card.flipped .flip-card-inner {
      transform: rotateY(180deg);
    }

    .flip-card-front,
    .flip-card-back {
      backface-visibility: hidden;
    }

    .flip-card-back {
      transform: rotateY(180deg);
    }
  </style>
