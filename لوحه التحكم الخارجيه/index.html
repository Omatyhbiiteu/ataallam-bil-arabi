            'warm-hover': '0 20px 25px -5px rgba(120, 113, 108, 0.15), 0 8px 10px -6px rgba(120, 113, 108, 0.1)',
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
            'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',

          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            shake: {
              '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
              '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
              '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
              '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
            },
            bounceCustom: {

  <style>
    :root {
      --primary-color: #c0392b;
      --secondary-color: #f39c12;
      --app-font-size: 16px;
      --app-transition-speed: 0.3s;
    }

    html {
      font-size: var(--app-font-size);
    }

    .animations-disabled *,
    .animations-disabled *::before,
    .animations-disabled *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background-color: #fffdf7;
      /* Warm Ivory */
      transition: background-color var(--app-transition-speed), color var(--app-transition-speed);
    }

    .dark body {
      background-color: #0f172a;
      color: #f8fafc;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #d6d3d1;
      /* Stone 300 */
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a8a29e;
      /* Stone 400 */
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #475569;
    }

    .dark ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .flip-card {
      perspective: 1000px;
    }

    .flip-card-inner {
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .flip-card.flipped .flip-card-inner {
      transform: rotateY(180deg);
    }

    .flip-card-front,
    .flip-card-back {
      backface-visibility: hidden;
    }

    .flip-card-back {
      transform: rotateY(180deg);
    }
  </style>
